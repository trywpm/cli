name: codeql

on:
  push: 
    branches: 
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      contents:  read
      security-events: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: setup go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"

      - name: initialize codeql
        uses: github/codeql-action/init@05b1a5d28f8763fd11e77388fe57846f1ba8e766 #v4.31.10
        with:
          languages: go

      - name: autobuild
        uses: github/codeql-action/autobuild@05b1a5d28f8763fd11e77388fe57846f1ba8e766 #v4.31.10

      - name: perform codeql analysis
        uses: github/codeql-action/analyze@05b1a5d28f8763fd11e77388fe57846f1ba8e766 #v4.31.10
        with: 
          category:  "/language:go"
